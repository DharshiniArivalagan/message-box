<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Box - Character Counter</title>

<style>

/* Page styling */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#cfd9df,#e2ebf0);
}

/* Message box container */

.container{
background:white;
width:420px;
padding:35px;
border-radius:20px;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

/* Title */

h2{
text-align:center;
margin-bottom:5px;
}

/* subtitle */

.max-text{
text-align:center;
color:gray;
margin-bottom:20px;
}

/* label */

label{
font-size:14px;
color:gray;
letter-spacing:1px;
}

/* textarea */

textarea{
width: 90%;
height:120px;
margin-top:10px;
border-radius:12px;
border:2px solid #7c8cff;
padding:15px;
font-size:16px;
outline:none;
resize:none;
transition:0.3s;
}

/* focus effect */

textarea:focus{
border-color:#4e5dff;
box-shadow:0 0 6px rgba(78,93,255,0.4);
}

/* counter section */

.counter{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
color:#555;
}

/* warning message */

.warning{
color:red;
font-size:14px;
margin-top:8px;
display:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Message Box</h2>
<p class="max-text">200 characters max</p>

<label>YOUR MESSAGE</label>

<textarea id="messageInput" placeholder="Enter your message"></textarea>

<div class="counter">
<span id="characterCount">0 / 200 characters</span>
<span id="remainingCount">200 remaining</span>
</div>

<p class="warning" id="warningMessage">
⚠ Character limit reached! You cannot type more.
</p>

</div>


<script>

/* Selecting elements */

const textarea = document.getElementById("messageInput");
const charCount = document.getElementById("characterCount");
const remainingCount = document.getElementById("remainingCount");
const warning = document.getElementById("warningMessage");

const maxLimit = 200;


/* Event listener for typing */

textarea.addEventListener("input", function(){

let currentLength = textarea.value.length;

/* Prevent typing more than 200 */

if(currentLength > maxLimit){
textarea.value = textarea.value.substring(0, maxLimit);
currentLength = maxLimit;
warning.style.display = "block";
}
else{
warning.style.display = "none";
}

/* Update counters */

charCount.textContent = currentLength + " / " + maxLimit + " characters";
remainingCount.textContent = (maxLimit - currentLength) + " remaining";

});

</script>

</body>
</html>
